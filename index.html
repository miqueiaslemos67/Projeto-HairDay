<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Catamaran:wght@400;700&display=swap"
      rel="stylesheet"
    />

    <link rel="icon" href="./src/assets/scissors.svg" />

    <title>Hair Day</title>
  </head>
  <body>
    <main class="container">
      <section class="sidebar">
        <img src="./src/assets/logo.svg" alt="Hair Day" class="logo" />

        <form class="form" aria-labelledby="form-title">
        <header>
          <h1 id="form-title">Agende um atendimento</h1>
          <p>
            Selecione data, horário e informe o nome do cliente para criar o
            agendamento
          </p>
        </header>

        <label for="date" class="label">Data</label>
        <div class="input">
          <i aria-hidden="true"
            ><img src="./src/assets/calendar.svg" alt=""
          /></i>
          <input type="date" id="date" name="date" required />
        </div>

        <span class="label">Horários</span>
        <ul
          id="hours"
          class="hours"
          aria-label="Horários disponíveis para agendamento"
        >
          <!--
          Exemplo: Manhã
          <li data-period="morning" class="hour-period">Manhã</li>
          <li data-period="morning" value="09:00" class="hour hour-available">
            09:00
          </li>
          <li data-period="morning" value="10:00" class="hour hour-available">
            10:00
          </li>
          <li data-period="morning" value="11:00" class="hour hour-unavailable">
            11:00
          </li>
          <li data-period="morning" value="12:00" class="hour hour-available">
            12:00
          </li>

          Exemplo: Tarde
          <li data-period="afternoon" class="hour-period">Tarde</li>
          <li
            data-period="afternoon"
            value="13:00"
            class="hour hour-unavailable"
          >
            13:00
          </li>
          <li
            data-period="afternoon"
            value="14:00"
            class="hour hour-unavailable"
          >
            14:00
          </li>
          <li data-period="afternoon" value="15:00" class="hour hour-available">
            15:00
          </li>
          <li
            data-period="afternoon"
            value="16:00"
            class="hour hour-unavailable"
          >
            16:00
          </li>
          <li
            data-period="afternoon"
            value="17:00"
            class="hour hour-unavailable"
          >
            17:00
          </li>
          <li data-period="afternoon" value="18:00" class="hour hour-available">
            18:00
          </li>

          Exemplo: Noite
          <li data-period="night" class="hour-period">Noite</li>
          <li data-period="night" value="19:00" class="hour hour-available">
            19:00
          </li>
          <li data-period="night" value="20:00" class="hour hour-available">
            20:00
          </li>
          <li data-period="night" value="21:00" class="hour hour-unavailable">
            21:00
          </li>
          -->
        </ul>

        <label for="client" class="label">Cliente</label>
        <div class="input">
          <i aria-hidden="true"><img src="./src/assets/person.svg" alt="" /></i>
          <input
            type="text"
            id="client"
            name="client"
            placeholder="Nome do cliente"
            required
          />
        </div>

        <button type="submit" class="button">Agendar</button>
        </form>
      </section>

      <aside class="schedule" aria-labelledby="schedule-title">
        <header>
          <div class="schedule-heading">
            <h1 id="schedule-title">Agendamentos do Dia</h1>
            <p>Visualize exclusivamente os atendimentos agendados para hoje</p>
          </div>

          <button
            type="button"
            class="schedule-date"
            aria-label="Data de hoje"
          >
            <img src="./src/assets/calendar.svg" alt="" />
            <span>10/01/2024</span>
            <img src="./src/assets/arrow-down.svg" alt="" />
          </button>
        </header>

        <section class="schedule-period">
          <header>
            <img src="./src/assets/morning.svg" alt="" />
            <strong>Manhã</strong>
            <!-- <span>09h-12h</span> -->
          </header>
          <ul id="period-morning" class="period">
            <!-- Exemplo
            <li>
              <strong>11:00</strong>
              <span>Rodrigo Goncalves</span>
              <img
                src="./src/assets/cancel.svg"
                alt="Cancelar"
                class="cancel-icon"
              />
            </li>
            -->
          </ul>
        </section>

        <section class="schedule-period">
          <header>
            <img src="./src/assets/afternoon.svg" alt="" />
            <strong>Tarde</strong>
            <!-- <span>13h-18h</span> -->
          </header>
          <ul id="period-afternoon" class="period">
            <!-- Exemplo
            <li>
              <strong>13:00</strong>
              <span>Rodrigo Goncalves</span>
              <img
                src="./src/assets/cancel.svg"
                alt="Cancelar"
                class="cancel-icon"
              />
            </li>
            -->
          </ul>
        </section>

        <section class="schedule-period">
          <header>
            <img src="./src/assets/night.svg" alt="" />
            <strong>Noite</strong>
            <!-- <span>19h-21h</span> -->
          </header>
          <ul id="period-night" class="period">
            <!-- Exemplo
            <li>
              <strong>19:00</strong>
              <span>Rodrigo Goncalves</span>
              <img
                src="./src/assets/cancel.svg"
                alt="Cancelar"
                class="cancel-icon"
              />
            </li>
            -->
          </ul>
        </section>

        <section class="upcoming-schedules" aria-labelledby="upcoming-title">
          <header class="upcoming-header">
            <div class="schedule-heading">
              <h1 id="upcoming-title">Próximos Agendamentos</h1>
              <p>Visualize todos os próximos atendimentos cadastrados</p>
            </div>
          </header>

          <div id="upcoming-groups" class="upcoming-groups">
            <!-- Renderizado via JavaScript -->
          </div>
        </section>
      </aside>
    </main>
  </body>
</html>
